<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 감정 일기 — MindTrade</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2e;
    --border: #2a2a3e;
    --accent: #00e5a0;
    --accent2: #ff4d6d;
    --accent3: #ffc847;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px 100px;
    position: relative;
    z-index: 1;
  }
  .header { text-align: center; padding: 40px 0 28px; }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), #00b4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .tagline { color: var(--muted); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-top: 8px; }

  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(13,13,20,0.96);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding: 8px 0 12px;
  }
  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .tab-btn .ti { font-size: 20px; transition: transform 0.2s; }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active .ti { transform: scale(1.2); }

  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    font-weight: 500;
  }
  .ig { margin-bottom: 14px; }
  .ig:last-child { margin-bottom: 0; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 7px; }

  input[type="text"], input[type="number"], input[type="date"], textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: none; height: 76px; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .tg { display: flex; gap: 8px; }
  .tb {
    flex: 1; padding: 12px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; cursor: pointer; transition: all 0.2s; font-weight: 500;
  }
  .tb.sb { background: rgba(0,229,160,0.15); border-color: var(--accent); color: var(--accent); }
  .tb.ss { background: rgba(255,77,109,0.15); border-color: var(--accent2); color: var(--accent2); }

  .egrid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
  .eb {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 4px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--surface2); cursor: pointer; transition: all 0.2s;
  }
  .eb.sel { border-color: var(--accent3); background: rgba(255,200,71,0.1); }
  .ei { font-size: 24px; }
  .el { font-size: 10px; color: var(--muted); font-family: 'Noto Sans KR', sans-serif; }
  .eb.sel .el { color: var(--accent3); }

  input[type="range"] {
    -webkit-appearance: none; width: 100%; height: 4px;
    background: var(--border); border-radius: 2px; outline: none; border: none; padding: 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: var(--accent); cursor: pointer; border: 3px solid var(--bg);
  }
  .slabels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--muted); }
  .sval { text-align: center; font-size: 28px; font-family: 'Bebas Neue', sans-serif; color: var(--accent); margin-bottom: 8px; letter-spacing: 2px; }

  .btn-p {
    width: 100%; padding: 16px; background: var(--accent); color: #000;
    border: none; border-radius: var(--radius); font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
  }
  .btn-p:hover { background: #00ffb3; transform: translateY(-1px); }

  /* ── 평단 계산기 ── */
  .buy-row {
    display: grid; grid-template-columns: 1fr 1fr auto;
    gap: 8px; margin-bottom: 8px; align-items: center;
  }
  .buy-row input { margin: 0; }
  .del-btn {
    width: 36px; height: 40px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--accent2); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .del-btn:hover { background: rgba(255,77,109,0.1); }
  .add-btn {
    width: 100%; padding: 10px; border-radius: 10px;
    border: 1px dashed var(--border); background: transparent;
    color: var(--muted); font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.2s; margin-bottom: 14px;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .avg-result {
    background: var(--surface2); border-radius: 14px;
    padding: 20px; margin-top: 14px; display: none;
  }
  .avg-result.show { display: block; animation: fadeIn 0.3s ease; }

  .res-main { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .res-lbl { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .res-price { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; line-height: 1; }
  .badge {
    padding: 6px 14px; border-radius: 50px;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px;
  }
  .bu { background: rgba(0,229,160,0.15); color: var(--accent); border: 1px solid rgba(0,229,160,0.3); }
  .bd { background: rgba(255,77,109,0.15); color: var(--accent2); border: 1px solid rgba(255,77,109,0.3); }
  .bf { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

  .arrow-vis {
    text-align: center; padding: 10px 0 18px;
    font-size: 15px; line-height: 1.8; color: var(--muted);
  }
  .arrow-main { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; }

  .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ri { background: var(--surface); border-radius: 10px; padding: 12px; }
  .ri-lbl { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .ri-val { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; }

  .comment-box {
    margin-top: 12px; background: var(--surface); border-radius: 10px;
    padding: 12px; font-size: 12px; color: var(--muted); line-height: 1.8; text-align: center;
  }

  /* ── 내역 ── */
  .srow { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
  .sc { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 12px; text-align: center; }
  .sv { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; line-height: 1; }
  .sl { font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

  .rec {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
    animation: fadeIn 0.3s ease;
  }
  .rec-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .rec-name { font-weight: 700; font-size: 16px; }
  .rec-pct { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; }
  .rec-pct.pos { color: var(--accent); }
  .rec-pct.neg { color: var(--accent2); }
  .rec-pct.neu { color: var(--muted); }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag {
    padding: 3px 9px; border-radius: 20px; font-size: 11px;
    background: var(--surface2); color: var(--muted);
  }
  .tag.buy { color: var(--accent); border: 1px solid rgba(0,229,160,0.25); }
  .tag.sell { color: var(--accent2); border: 1px solid rgba(255,77,109,0.25); }

  .pu { background: var(--surface2); border-radius: 10px; padding: 12px; margin-top: 6px; }
  .pu-lbl { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .pu-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: center; }
  .pu-row input {
    padding: 9px 12px; font-size: 13px; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif; outline: none; width: 100%;
    -moz-appearance: textfield;
  }
  .pu-row input:focus { border-color: var(--accent); }
  .mini { text-align: right; }
  .mini-pct { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; }
  .mini-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── 인사이트 ── */
  .ib {
    background: linear-gradient(135deg, rgba(0,229,160,0.1), rgba(0,180,255,0.1));
    border: 1px solid rgba(0,229,160,0.2);
    border-radius: var(--radius); padding: 24px 20px; margin-bottom: 14px; text-align: center;
  }
  .ii { font-size: 40px; margin-bottom: 8px; }
  .it { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent); }
  .id { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.7; }
  .br { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bl { width: 28px; font-size: 20px; flex-shrink: 0; text-align: center; }
  .bt { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bf2 { height: 100%; border-radius: 4px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }
  .bv { width: 44px; text-align: right; font-size: 13px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; flex-shrink: 0; }
  .bv.pos { color: var(--accent); }
  .bv.neg { color: var(--accent2); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.7; }

  .toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: #000;
    padding: 13px 24px; border-radius: 50px;
    font-weight: 700; font-size: 14px;
    transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    z-index: 200; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">MindTrade</div>
    <div class="tagline">감정이 수익률을 결정한다</div>
  </div>

  <!-- 기록 -->
  <div class="page active" id="page-record">
    <div class="card">
      <div class="card-title">매매 정보</div>
      <div class="ig">
        <label>종목명</label>
        <input type="text" id="stock" placeholder="예: 삼성전자, TSMC, NVDA">
      </div>
      <div class="row2">
        <div class="ig">
          <label>날짜</label>
          <input type="date" id="tradeDate">
        </div>
        <div class="ig">
          <label>구분</label>
          <div class="tg">
            <button class="tb" id="btn-buy" onclick="selType('buy')">매수</button>
            <button class="tb" id="btn-sell" onclick="selType('sell')">매도</button>
          </div>
        </div>
      </div>
      <div class="row2">
        <div class="ig">
          <label>평단가 (원)</label>
          <input type="number" id="avgPrice" placeholder="예: 75000">
        </div>
        <div class="ig">
          <label>수량 (주)</label>
          <input type="number" id="qty" placeholder="예: 10">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">지금 감정 상태</div>
      <div class="egrid">
        <button class="eb" onclick="selEmo('excited')" id="eo-excited"><span class="ei">🔥</span><span class="el">흥분</span></button>
        <button class="eb" onclick="selEmo('anxious')" id="eo-anxious"><span class="ei">😰</span><span class="el">불안</span></button>
        <button class="eb" onclick="selEmo('confident')" id="eo-confident"><span class="ei">💪</span><span class="el">확신</span></button>
        <button class="eb" onclick="selEmo('fear')" id="eo-fear"><span class="ei">😱</span><span class="el">두려움</span></button>
        <button class="eb" onclick="selEmo('numb')" id="eo-numb"><span class="ei">😶</span><span class="el">무감각</span></button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">분석 확신도</div>
      <div class="sval" id="cdis">3점</div>
      <input type="range" id="confidence" min="1" max="5" value="3"
        oninput="document.getElementById('cdis').textContent=this.value+'점'">
      <div class="slabels"><span>충동매매</span><span>완벽분석</span></div>
    </div>

    <div class="card">
      <div class="card-title">한 줄 메모 (선택)</div>
      <textarea id="memo" placeholder="왜 이 매매를 했나요?"></textarea>
    </div>

    <button class="btn-p" onclick="saveRec()">감정 기록 저장하기</button>
  </div>

  <!-- 평단 계산기 -->
  <div class="page" id="page-calc">
    <div class="card">
      <div class="card-title">매수 회차별 입력</div>
      <div style="display:grid; grid-template-columns:1fr 1fr auto; gap:8px; margin-bottom:6px;">
        <div style="font-size:11px; color:var(--muted);">매수가 (원)</div>
        <div style="font-size:11px; color:var(--muted);">수량 (주)</div>
        <div style="width:36px;"></div>
      </div>
      <div id="buy-rows">
        <div class="buy-row">
          <input type="number" class="pi" placeholder="예: 75000" oninput="calcAvg()">
          <input type="number" class="qi" placeholder="예: 10" oninput="calcAvg()">
          <button class="del-btn" onclick="delRow(this)">×</button>
        </div>
        <div class="buy-row">
          <input type="number" class="pi" placeholder="예: 68000" oninput="calcAvg()">
          <input type="number" class="qi" placeholder="예: 5" oninput="calcAvg()">
          <button class="del-btn" onclick="delRow(this)">×</button>
        </div>
      </div>
      <button class="add-btn" onclick="addRow()">＋ 회차 추가 (물타기/분할매수)</button>
      <div class="ig" style="margin-bottom:0;">
        <label>현재 주가 (원)</label>
        <input type="number" id="curP" placeholder="예: 82000" oninput="calcAvg()">
      </div>
    </div>

    <div class="avg-result" id="avg-res">
      <div class="res-main">
        <div>
          <div class="res-lbl">평단가</div>
          <div class="res-price" id="r-avg">—</div>
        </div>
        <div class="badge bf" id="r-badge">입력 대기</div>
      </div>

      <div class="arrow-vis" id="r-arrow">현재가를 입력해주세요</div>

      <div class="res-grid">
        <div class="ri"><div class="ri-lbl">수익률</div><div class="ri-val" id="r-pct">—</div></div>
        <div class="ri"><div class="ri-lbl">평가손익</div><div class="ri-val" id="r-pnl">—</div></div>
        <div class="ri"><div class="ri-lbl">총 매수금액</div><div class="ri-val" id="r-cost">—</div></div>
        <div class="ri"><div class="ri-lbl">총 평가금액</div><div class="ri-val" id="r-eval">—</div></div>
      </div>

      <div class="comment-box" id="r-comment"></div>
    </div>
  </div>

  <!-- 내역 -->
  <div class="page" id="page-history">
    <div class="srow">
      <div class="sc"><div class="sv" id="st-tot" style="color:var(--accent)">0</div><div class="sl">총 기록</div></div>
      <div class="sc"><div class="sv" id="st-avg" style="color:var(--accent3)">-</div><div class="sl">평균 수익</div></div>
      <div class="sc"><div class="sv" id="st-win" style="color:var(--accent2)">-</div><div class="sl">승률</div></div>
    </div>
    <div id="hist-list"></div>
  </div>

  <!-- 인사이트 -->
  <div class="page" id="page-insight">
    <div id="ins-content"></div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('record',this)">
    <span class="ti">📝</span>기록
  </button>
  <button class="tab-btn" onclick="switchTab('calc',this)">
    <span class="ti">🧮</span>평단계산
  </button>
  <button class="tab-btn" onclick="switchTab('history',this)">
    <span class="ti">📋</span>내역
  </button>
  <button class="tab-btn" onclick="switchTab('insight',this)">
    <span class="ti">📊</span>인사이트
  </button>
</div>
<div class="toast" id="toast"></div>

<script>
const EMO = {
  excited:   {i:'🔥', l:'흥분'},
  anxious:   {i:'😰', l:'불안'},
  confident: {i:'💪', l:'확신'},
  fear:      {i:'😱', l:'두려움'},
  numb:      {i:'😶', l:'무감각'},
};

let sType = null, sEmo = null;
let recs = JSON.parse(localStorage.getItem('mt3') || '[]');
document.getElementById('tradeDate').value = new Date().toISOString().split('T')[0];

function switchTab(t, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  btn.classList.add('active');
  if (t==='history') renderHist();
  if (t==='insight') renderIns();
}

function selType(t) {
  sType = t;
  document.getElementById('btn-buy').className = 'tb'+(t==='buy'?' sb':'');
  document.getElementById('btn-sell').className = 'tb'+(t==='sell'?' ss':'');
}

function selEmo(e) {
  sEmo = e;
  document.querySelectorAll('.eb').forEach(b => b.classList.remove('sel'));
  document.getElementById('eo-'+e).classList.add('sel');
}

function saveRec() {
  const stock = document.getElementById('stock').value.trim();
  const date  = document.getElementById('tradeDate').value;
  const memo  = document.getElementById('memo').value.trim();
  const conf  = parseInt(document.getElementById('confidence').value);
  const avgP  = parseFloat(document.getElementById('avgPrice').value)||null;
  const qty   = parseFloat(document.getElementById('qty').value)||null;

  if (!stock)  { toast('❗ 종목명을 입력해주세요'); return; }
  if (!sType)  { toast('❗ 매수/매도를 선택해주세요'); return; }
  if (!sEmo)   { toast('❗ 감정 상태를 선택해주세요'); return; }

  recs.unshift({ id:Date.now(), stock, date, memo, confidence:conf,
    type:sType, emotion:sEmo, avgPrice:avgP, qty, currentPrice:null });
  save();

  ['stock','memo','avgPrice','qty'].forEach(id => document.getElementById(id).value='');
  document.getElementById('confidence').value=3;
  document.getElementById('cdis').textContent='3점';
  sType=null; sEmo=null;
  document.querySelectorAll('.tb').forEach(b=>b.className='tb');
  document.querySelectorAll('.eb').forEach(b=>b.classList.remove('sel'));
  toast('✅ 감정 기록 완료!');
}

/* ── 평단 계산기 ── */
function addRow() {
  const row = document.createElement('div');
  row.className = 'buy-row';
  row.innerHTML = `
    <input type="number" class="pi" placeholder="매수가" oninput="calcAvg()">
    <input type="number" class="qi" placeholder="수량" oninput="calcAvg()">
    <button class="del-btn" onclick="delRow(this)">×</button>`;
  document.getElementById('buy-rows').appendChild(row);
}

function delRow(btn) {
  const rows = document.querySelectorAll('.buy-row');
  if (rows.length<=1) { toast('❗ 최소 1행 필요'); return; }
  btn.closest('.buy-row').remove();
  calcAvg();
}

function calcAvg() {
  const ps = [...document.querySelectorAll('.pi')].map(i=>parseFloat(i.value));
  const qs = [...document.querySelectorAll('.qi')].map(i=>parseFloat(i.value));
  const cur = parseFloat(document.getElementById('curP').value);

  let cost=0, qty=0;
  for (let i=0;i<ps.length;i++) {
    if (!isNaN(ps[i])&&!isNaN(qs[i])&&ps[i]>0&&qs[i]>0) {
      cost += ps[i]*qs[i]; qty += qs[i];
    }
  }

  const res = document.getElementById('avg-res');
  if (qty===0) { res.classList.remove('show'); return; }

  const avg = cost/qty;
  res.classList.add('show');
  document.getElementById('r-avg').textContent = fmt(avg)+'원';
  document.getElementById('r-cost').textContent = fmtK(cost);

  if (!isNaN(cur) && cur>0) {
    const pct = (cur-avg)/avg*100;
    const pnl = (cur-avg)*qty;
    const ev  = cur*qty;
    const isUp = pct>0.01, isDn = pct<-0.01;
    const col = isUp?'var(--accent)':isDn?'var(--accent2)':'var(--muted)';

    document.getElementById('r-pct').textContent = (isUp?'+':'')+pct.toFixed(2)+'%';
    document.getElementById('r-pct').style.color = col;
    document.getElementById('r-pnl').textContent = (pnl>=0?'+':'')+fmtK(pnl);
    document.getElementById('r-pnl').style.color = col;
    document.getElementById('r-eval').textContent = fmtK(ev);

    const badge = document.getElementById('r-badge');
    if (isUp)      { badge.textContent='▲ 상승'; badge.className='badge bu'; }
    else if (isDn) { badge.textContent='▼ 하락'; badge.className='badge bd'; }
    else           { badge.textContent='— 보합'; badge.className='badge bf'; }

    const arrow = document.getElementById('r-arrow');
    const dir = isUp ? '📈' : isDn ? '📉' : '➡️';
    arrow.innerHTML = `
      <div style="color:var(--muted); font-size:12px; margin-bottom:6px;">평단가 → 현재가</div>
      <div class="arrow-main" style="color:${col}">${fmt(avg)}원 ${dir} ${fmt(cur)}원</div>
      <div style="font-size:12px; margin-top:6px; color:${col}">${isUp?'+':''}${pct.toFixed(2)}% / ${pnl>=0?'+':''}${fmtK(pnl)}</div>`;

    let cm = '';
    if (pct>=20)       cm='🎉 대박! 20% 이상 수익이에요. 분할 매도를 고민해볼 때!';
    else if (pct>=10)  cm='😊 10% 이상 수익 중. 잘 버티고 있어요!';
    else if (pct>=0)   cm='🙂 소폭 수익 구간이에요. 조금만 더 지켜봐요.';
    else if (pct>=-10) cm='😬 소폭 손실 구간이에요. 분할 추가 매수를 검토해보세요.';
    else if (pct>=-20) cm='😟 -10% 이상 손실 중. 손절 기준을 다시 점검해봐요.';
    else               cm='🚨 -20% 이상 손실이에요. 냉정하게 손절을 고려할 때입니다.';
    document.getElementById('r-comment').textContent = cm;

  } else {
    document.getElementById('r-pct').textContent = '—';
    document.getElementById('r-pnl').textContent = '—';
    document.getElementById('r-eval').textContent = '—';
    document.getElementById('r-badge').textContent = '현재가 입력';
    document.getElementById('r-badge').className = 'badge bf';
    document.getElementById('r-arrow').innerHTML =
      `<div style="color:var(--muted); font-size:13px;">현재 주가를 입력하면 자동 계산돼요!</div>`;
    document.getElementById('r-comment').textContent = '';
  }
}

/* ── 내역 ── */
function renderHist() {
  const list = document.getElementById('hist-list');
  updateStats();
  if (recs.length===0) {
    list.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">아직 기록이 없어요.<br>첫 매매 감정을 기록해보세요!</div></div>`;
    return;
  }
  list.innerHTML = recs.map(r => {
    const emo = EMO[r.emotion];
    const has = r.avgPrice && r.qty;
    const hasCur = r.currentPrice;
    let pct=null, pnl=null;
    if (has && hasCur) { pct=(r.currentPrice-r.avgPrice)/r.avgPrice*100; pnl=(r.currentPrice-r.avgPrice)*r.qty; }
    const pc = pct===null?'neu':pct>=0?'pos':'neg';
    const pt = pct===null?'-':(pct>=0?'+':'')+pct.toFixed(2)+'%';

    return `<div class="rec">
      <div class="rec-top">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:28px;">${emo.i}</span>
          <div>
            <div class="rec-name">${r.stock}</div>
            <div style="font-size:11px;color:var(--muted);">${r.date}</div>
          </div>
        </div>
        <div class="rec-pct ${pc}">${pt}</div>
      </div>
      <div class="tags">
        <span class="tag ${r.type}">${r.type==='buy'?'📈 매수':'📉 매도'}</span>
        <span class="tag">${emo.l}</span>
        <span class="tag">확신 ${r.confidence}점</span>
        ${has?`<span class="tag">평단 ${fmt(r.avgPrice)}원 × ${r.qty}주</span>`:''}
      </div>
      ${has?`
      <div class="pu">
        <div class="pu-lbl">📍 현재 주가 입력 → 수익률 자동 계산</div>
        <div class="pu-row">
          <input type="number" placeholder="현재 주가 (원)"
            value="${r.currentPrice||''}"
            oninput="updCur(${r.id},this.value)">
          <div class="mini">
            ${pct!==null?`
              <div class="mini-pct" style="color:${pct>=0?'var(--accent)':'var(--accent2)'}">
                ${pct>=0?'+':''}${pct.toFixed(2)}%
              </div>
              <div class="mini-sub">${pnl>=0?'+':''}${fmtK(pnl)}</div>
              <div class="mini-sub" style="margin-top:2px;">${pct>=0?'📈 상승 중':'📉 하락 중'}</div>
            `:'<div style="color:var(--muted);font-size:12px;">입력 대기</div>'}
          </div>
        </div>
      </div>`:''}
      ${r.memo?`<div style="margin-top:10px;font-size:12px;color:var(--muted);background:var(--surface2);padding:10px 12px;border-radius:8px;line-height:1.6;">💬 ${r.memo}</div>`:''}
    </div>`;
  }).join('');
}

function updCur(id, val) {
  const r = recs.find(r=>r.id===id);
  if (r) { r.currentPrice = val===''?null:parseFloat(val); save(); renderHist(); }
}

function updateStats() {
  const wc = recs.filter(r=>r.avgPrice&&r.qty&&r.currentPrice);
  const ps = wc.map(r=>(r.currentPrice-r.avgPrice)/r.avgPrice*100);
  const avg = ps.length?(ps.reduce((a,b)=>a+b,0)/ps.length).toFixed(1):null;
  const wr = ps.length?(ps.filter(p=>p>0).length/ps.length*100).toFixed(0):null;
  document.getElementById('st-tot').textContent = recs.length;
  document.getElementById('st-avg').textContent = avg!==null?(parseFloat(avg)>=0?'+':'')+avg+'%':'-';
  document.getElementById('st-win').textContent = wr!==null?wr+'%':'-';
}

/* ── 인사이트 ── */
function renderIns() {
  const c = document.getElementById('ins-content');
  const wc = recs.filter(r=>r.avgPrice&&r.qty&&r.currentPrice);
  if (wc.length<3) {
    c.innerHTML=`
      <div class="ib"><div class="ii">🔬</div><div class="it">데이터 수집 중</div>
      <div class="id">현재가가 입력된 기록이 3개 이상 있어야<br>인사이트를 분석할 수 있어요!</div></div>
      <div class="card"><div class="card-title">분석 가능한 인사이트</div>
      <div style="color:var(--muted);font-size:13px;line-height:2.2;">
        🔥 감정별 평균 수익률<br>💪 확신도 높을 때 vs 낮을 때<br>📈 승률 패턴<br>🧠 최고의 매매 감정 찾기
      </div></div>`;
    return;
  }

  const byE = {};
  for (const k in EMO) {
    const rs = wc.filter(r=>r.emotion===k);
    if (rs.length>0) {
      const avg = rs.map(r=>(r.currentPrice-r.avgPrice)/r.avgPrice*100).reduce((a,b)=>a+b,0)/rs.length;
      byE[k]={avg:avg.toFixed(1),count:rs.length};
    }
  }
  let bestE=null, bestV=-Infinity;
  for (const k in byE) if (parseFloat(byE[k].avg)>bestV) { bestV=parseFloat(byE[k].avg); bestE=k; }
  const mxA = Math.max(...Object.values(byE).map(v=>Math.abs(parseFloat(v.avg))),1);

  const bars = Object.entries(byE).map(([k,v])=>{
    const isP = parseFloat(v.avg)>=0;
    const pct = (Math.abs(parseFloat(v.avg))/mxA*100).toFixed(0);
    return `<div class="br">
      <div class="bl">${EMO[k].i}</div>
      <div class="bt"><div class="bf2" style="width:${pct}%;background:${isP?'var(--accent)':'var(--accent2)'};"></div></div>
      <div class="bv ${isP?'pos':'neg'}">${isP?'+':''}${v.avg}%</div>
    </div>`;
  }).join('');

  const hc = wc.filter(r=>r.confidence>=4);
  const lc = wc.filter(r=>r.confidence<=2);
  const hA = hc.length?(hc.map(r=>(r.currentPrice-r.avgPrice)/r.avgPrice*100).reduce((a,b)=>a+b,0)/hc.length).toFixed(1):null;
  const lA = lc.length?(lc.map(r=>(r.currentPrice-r.avgPrice)/r.avgPrice*100).reduce((a,b)=>a+b,0)/lc.length).toFixed(1):null;
  const allP = wc.map(r=>(r.currentPrice-r.avgPrice)/r.avgPrice*100);
  const wr = (allP.filter(p=>p>0).length/allP.length*100).toFixed(0);

  c.innerHTML=`
    ${bestE?`<div class="ib"><div class="ii">${EMO[bestE].i}</div><div class="it">${EMO[bestE].l} 상태가 최고!</div>
    <div class="id">${EMO[bestE].l} 상태일 때 평균 <strong style="color:var(--accent)">${bestV>=0?'+':''}${byE[bestE].avg}%</strong> 수익률로<br>가장 좋은 결과를 냈어요.</div></div>`:''}
    <div class="card"><div class="card-title">감정별 평균 수익률</div>${bars}</div>
    ${(hA!==null||lA!==null)?`
    <div class="card"><div class="card-title">분석 확신도 vs 수익률</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;">
      ${hA!==null?`<div style="text-align:center;padding:16px;background:var(--surface2);border-radius:12px;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:${parseFloat(hA)>=0?'var(--accent)':'var(--accent2)'};letter-spacing:2px;">${parseFloat(hA)>=0?'+':''}${hA}%</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;">충분히 분석<br>(4~5점)</div></div>`:''}
      ${lA!==null?`<div style="text-align:center;padding:16px;background:var(--surface2);border-radius:12px;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:${parseFloat(lA)>=0?'var(--accent)':'var(--accent2)'};letter-spacing:2px;">${parseFloat(lA)>=0?'+':''}${lA}%</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;">충동매매<br>(1~2점)</div></div>`:''}
    </div></div>`:''}
    <div class="card"><div class="card-title">기록 요약</div>
    <div style="color:var(--muted);font-size:13px;line-height:2.4;">
      📊 분석된 거래: <strong style="color:var(--text)">${wc.length}개</strong><br>
      📈 수익 거래: <strong style="color:var(--accent)">${allP.filter(p=>p>0).length}개</strong><br>
      📉 손실 거래: <strong style="color:var(--accent2)">${allP.filter(p=>p<0).length}개</strong><br>
      ⚖️ 승률: <strong style="color:var(--accent3)">${wr}%</strong>
    </div></div>`;
}

function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }
function fmtK(n) {
  const a=Math.abs(n), s=n<0?'-':'';
  if (a>=100000000) return s+(a/100000000).toFixed(1)+'억';
  if (a>=10000)     return s+(a/10000).toFixed(1)+'만원';
  return s+Math.round(a).toLocaleString()+'원';
}
function save() { localStorage.setItem('mt3', JSON.stringify(recs)); }
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
